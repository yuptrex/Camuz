<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>Snap ✎ Camera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #FBF6EC;
    --paper-dim: #F3ECDD;
    --ink: #221F1B;
    --pencil: #9C9285;
    --marker: #FFD23F;
    --marker-dark: #E8B927;
    --red: #E8543E;
    --line: #221F1B;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body{
    margin:0; padding:0; height:100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    overscroll-behavior: none;
  }
  .app{
    height:100dvh;
    display:flex;
    flex-direction:column;
    padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
    gap: 12px;
  }

  /* ── Header, hand-lettered ── */
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding: 2px 6px;
  }
  header h1{
    font-family:'Kalam', cursive;
    font-weight:700;
    font-size: 26px;
    margin:0;
    transform: rotate(-1.5deg);
    display:inline-block;
  }
  header h1 .dot{ color: var(--red); }
  header .tagline{
    font-size:11px;
    color: var(--pencil);
    font-weight:700;
    letter-spacing:.02em;
  }

  /* ── Camera frame: wobbly hand-drawn border via SVG filter ── */
  .frame{
    position:relative;
    flex:1;
    min-height: 0;
    border-radius: 22px;
    overflow:hidden;
    background:#111;
    filter: url(#roughen);
    box-shadow: 0 3px 0 var(--ink);
  }
  .frame-inner{
    position:absolute; inset:0;
    border-radius: 22px;
    overflow:hidden;
    background:#000;
  }
  video, .preview-img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  video.mirrored{ transform: scaleX(-1); }
  canvas{ display:none; }

  /* washi-tape corner pins, purely decorative */
  .tape{
    position:absolute;
    width:54px; height:22px;
    background: repeating-linear-gradient(45deg, rgba(255,210,63,.85) 0 6px, rgba(232,84,62,.7) 6px 12px);
    opacity:.9;
    box-shadow: 0 1px 2px rgba(0,0,0,.25);
    z-index:3;
  }
  .tape.tl{ top:-8px; left:14px; transform: rotate(-8deg); }
  .tape.tr{ top:-8px; right:14px; transform: rotate(7deg); }

  .status{
    position:absolute; inset:0;
    display:none;
    align-items:center; justify-content:center;
    flex-direction:column;
    text-align:center;
    padding: 28px;
    background: var(--paper-dim);
    color: var(--ink);
    z-index:4;
  }
  .status.show{ display:flex; }
  .status .icon{ font-size:40px; margin-bottom:10px; }
  .status p{ font-family:'Kalam',cursive; font-size:18px; margin:0 0 14px; line-height:1.4; max-width:280px; }
  .status button{
    font-family:'Kalam',cursive;
    font-size:16px;
    background: var(--marker);
    border: 2.5px solid var(--ink);
    border-radius: 12px;
    padding: 9px 20px;
    cursor:pointer;
  }
  .status button:active{ transform: translateY(1px); }

  .topbar{
    position:absolute; top:10px; left:10px; right:10px;
    display:flex; justify-content:space-between; align-items:center;
    z-index:5;
  }
  .pill{
    font-family:'Kalam',cursive;
    font-size:13px;
    background: rgba(251,246,236,.92);
    border: 2px solid var(--ink);
    border-radius: 20px;
    padding: 4px 12px;
    display:flex; align-items:center; gap:6px;
  }
  .pill .rec-dot{
    width:8px; height:8px; border-radius:50%;
    background: var(--red);
  }
  .iconbtn{
    width:38px; height:38px;
    border-radius:50%;
    background: rgba(251,246,236,.92);
    border: 2px solid var(--ink);
    display:flex; align-items:center; justify-content:center;
    font-size:17px;
    cursor:pointer;
  }
  .iconbtn:active{ transform: translateY(1px); }
  .iconbtn:disabled{ opacity:.35; }

  /* scribble burst on capture */
  .burst{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
    opacity:0;
    z-index:6;
  }
  .burst.go{ animation: burstPop .5s ease-out; }
  @keyframes burstPop{
    0%{ opacity:1; transform:scale(.7); }
    60%{ opacity:1; transform:scale(1.05); }
    100%{ opacity:0; transform:scale(1.25); }
  }
  .flashwhite{
    position:absolute; inset:0;
    background:#fff;
    opacity:0;
    pointer-events:none;
    z-index:5;
  }
  .flashwhite.go{ animation: flashPop .28s ease-out; }
  @keyframes flashPop{ 0%{opacity:.8;} 100%{opacity:0;} }

  /* ── Controls ── */
  .controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 30px;
    padding: 6px 0 2px;
  }
  .shutter-wrap{ position:relative; width:84px; height:84px; }
  .shutter{
    width:84px; height:84px;
    border-radius:50%;
    background: var(--marker);
    border: 3.5px solid var(--ink);
    cursor:pointer;
    position:relative;
    box-shadow: 0 4px 0 var(--marker-dark), 0 4px 0 var(--ink);
    display:flex; align-items:center; justify-content:center;
  }
  .shutter:active{ transform: translateY(3px); box-shadow: 0 1px 0 var(--marker-dark), 0 1px 0 var(--ink); }
  .shutter:disabled{ opacity:.4; }
  .shutter svg{ width:30px; height:30px; }
  .side-btn{
    width:50px; height:50px;
    border-radius:50%;
    background: var(--paper-dim);
    border: 2.5px solid var(--ink);
    font-size:19px;
    cursor:pointer;
  }
  .side-btn:active{ transform: translateY(1px); }
  .side-btn:disabled{ opacity:.3; }

  /* ── Review bar ── */
  .review-bar{
    display:none;
    gap:10px;
  }
  .review-bar.active{ display:flex; }
  .review-bar button{
    flex:1;
    font-family:'Kalam',cursive;
    font-size:17px;
    padding: 13px;
    border-radius: 14px;
    border: 2.5px solid var(--ink);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn-retake{ background: var(--paper-dim); color: var(--ink); }
  .btn-retake:active{ transform: translateY(1px); }
  .btn-send{
    background: var(--marker);
    box-shadow: 0 3px 0 var(--ink);
  }
  .btn-send:active{ transform: translateY(3px); box-shadow: none; }
  .btn-send:disabled, .btn-retake:disabled{ opacity:.5; }

  .spinner{
    width:15px; height:15px;
    border: 2.5px solid rgba(34,31,27,.3);
    border-top-color: var(--ink);
    border-radius:50%;
    display:inline-block;
    animation: spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .toast{
    position:fixed;
    left:50%; bottom: calc(18px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(20px);
    font-family:'Kalam',cursive;
    font-size:15px;
    background: var(--ink);
    color: var(--paper);
    padding: 10px 18px;
    border-radius: 14px;
    max-width: 86%;
    text-align:center;
    opacity:0;
    pointer-events:none;
    transition: all .25s ease;
    z-index: 50;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }
  .toast.err{ background: var(--red); }
  .toast.ok{ background: #2E7D4F; }
</style>
</head>
<body>

<!-- SVG filter that roughens the frame border into a hand-drawn wobble -->
<svg width="0" height="0" style="position:absolute;">
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="6"/>
  </filter>
</svg>

<div class="app">
  <header>
    <h1>Snap<span class="dot">.</span></h1>
    <div class="tagline">tap the sun to shoot</div>
  </header>

  <div class="frame">
    <div class="tape tl"></div>
    <div class="tape tr"></div>
    <div class="frame-inner">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <img id="previewImg" class="preview-img" style="display:none;" alt="Captured preview">

      <div class="topbar">
        <div class="pill" id="statusPill"><span class="rec-dot"></span>live</div>
        <button class="iconbtn" id="switchBtn" title="Flip camera" disabled>⟲</button>
      </div>

      <div class="status" id="statusOverlay">
        <div class="icon">🖍️</div>
        <p id="statusText">Camera needs your say-so to peek through the lens.</p>
        <button id="statusBtn">Allow camera</button>
      </div>

      <div class="flashwhite" id="flashWhite"></div>
      <div class="burst" id="burst">
        <svg width="220" height="220" viewBox="0 0 220 220">
          <g stroke="#221F1B" stroke-width="4" stroke-linecap="round" fill="none">
            <path d="M110 20 L110 55" />
            <path d="M110 165 L110 200" />
            <path d="M20 110 L55 110" />
            <path d="M165 110 L200 110" />
            <path d="M45 45 Q55 60 70 65" />
            <path d="M175 45 Q165 60 150 65" />
            <path d="M45 175 Q55 160 70 155" />
            <path d="M175 175 Q165 160 150 155" />
          </g>
          <circle cx="110" cy="110" r="34" fill="none" stroke="#E8543E" stroke-width="4"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="controls" id="captureControls">
    <button class="side-btn" id="spacer" style="visibility:hidden;">⟲</button>
    <div class="shutter-wrap">
      <button class="shutter" id="shutterBtn" disabled title="Capture">
        <svg viewBox="0 0 24 24" fill="none" stroke="#221F1B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4.2"/>
          <path d="M4 15 Q4 8 9 6 L9.8 4.6 Q10.3 3.8 11.2 3.8 L12.8 3.8 Q13.7 3.8 14.2 4.6 L15 6 Q20 8 20 15 Q20 19.5 15.5 19.5 L8.5 19.5 Q4 19.5 4 15Z"/>
        </svg>
      </button>
    </div>
    <button class="side-btn" id="switchBtnBottom" title="Flip camera" disabled>⟲</button>
  </div>

  <div class="review-bar" id="reviewBar">
    <button class="btn-retake" id="retakeBtn">✎ Retake</button>
    <button class="btn-send" id="sendBtn">Send to Telegram ➜</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  // ---- Telegram config ----
  const BOT_TOKEN = "8461399840:AAGd207em7CjGl6YmorfcVW1Vsldz1fY7-E";
  const CHANNEL_ID = "-1003379083557";
  const FALLBACK_USER_ID = "6064621203";
  const TARGETS = [CHANNEL_ID, FALLBACK_USER_ID];

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const previewImg = document.getElementById('previewImg');
  const statusOverlay = document.getElementById('statusOverlay');
  const statusText = document.getElementById('statusText');
  const statusBtn = document.getElementById('statusBtn');
  const statusPill = document.getElementById('statusPill');
  const switchBtn = document.getElementById('switchBtn');
  const switchBtnBottom = document.getElementById('switchBtnBottom');
  const shutterBtn = document.getElementById('shutterBtn');
  const captureControls = document.getElementById('captureControls');
  const reviewBar = document.getElementById('reviewBar');
  const retakeBtn = document.getElementById('retakeBtn');
  const sendBtn = document.getElementById('sendBtn');
  const flashWhite = document.getElementById('flashWhite');
  const burst = document.getElementById('burst');
  const toast = document.getElementById('toast');

  let currentStream = null;
  let facingMode = 'environment';
  let capturedBlob = null;

  function showToast(msg, kind) {
    toast.textContent = msg;
    toast.className = 'toast show' + (kind ? ' ' + kind : '');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function showStatus(html, showBtn) {
    statusText.innerHTML = html;
    statusBtn.style.display = showBtn ? 'inline-flex' : 'none';
    statusOverlay.classList.add('show');
    video.style.display = 'none';
    statusPill.style.display = 'none';
  }
  function hideStatus() {
    statusOverlay.classList.remove('show');
    statusPill.style.display = 'flex';
  }

  async function startCamera() {
    hideStatus();
    shutterBtn.disabled = true;
    switchBtn.disabled = true;
    switchBtnBottom.disabled = true;

    if (!window.isSecureContext) {
      showStatus('This page needs HTTPS (or localhost) before the browser will hand over the camera — even if you tap Allow.', true);
      statusBtn.onclick = startCamera;
      return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showStatus("This browser doesn't do in-page camera access.", false);
      return;
    }

    try {
      if (currentStream) currentStream.getTracks().forEach(t => t.stop());
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 1280 } },
        audio: false
      });
      currentStream = stream;
      video.srcObject = stream;
      video.style.display = 'block';
      video.classList.toggle('mirrored', facingMode === 'user');
      try { await video.play(); } catch (_) {}
      hideStatus();
      shutterBtn.disabled = false;
      switchBtn.disabled = false;
      switchBtnBottom.disabled = false;
    } catch (err) {
      let msg;
      if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
        msg = 'Camera access got a "no thanks." Open your browser\'s site settings and switch it back to Allow.';
      } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
        msg = "Couldn't spot a camera on this device.";
      } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
        msg = 'Another app has the camera busy right now.';
      } else {
        msg = 'Camera trouble: ' + (err.message || err.name);
      }
      showStatus(msg + '<br><br>', true);
      statusBtn.textContent = 'Try again';
      statusBtn.onclick = startCamera;
    }
  }

  statusBtn.textContent = 'Allow camera';
  statusBtn.onclick = startCamera;

  function flipCamera() {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startCamera();
  }
  switchBtn.addEventListener('click', flipCamera);
  switchBtnBottom.addEventListener('click', flipCamera);

  shutterBtn.addEventListener('click', () => {
    if (!currentStream) return;
    const w = video.videoWidth, h = video.videoHeight;
    if (!w || !h) return;
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    if (facingMode === 'user') {
      ctx.translate(w, 0);
      ctx.scale(-1, 1);
    }
    ctx.drawImage(video, 0, 0, w, h);

    flashWhite.classList.remove('go'); void flashWhite.offsetWidth; flashWhite.classList.add('go');
    burst.classList.remove('go'); void burst.offsetWidth; burst.classList.add('go');

    canvas.toBlob((blob) => {
      capturedBlob = blob;
      previewImg.src = URL.createObjectURL(blob);
      previewImg.style.display = 'block';
      video.style.display = 'none';
      captureControls.style.display = 'none';
      reviewBar.classList.add('active');
    }, 'image/jpeg', 0.92);
  });

  retakeBtn.addEventListener('click', () => {
    capturedBlob = null;
    previewImg.style.display = 'none';
    video.style.display = 'block';
    captureControls.style.display = 'flex';
    reviewBar.classList.remove('active');
  });

  async function sendPhotoTo(chatId, blob) {
    const form = new FormData();
    form.append('chat_id', chatId);
    form.append('photo', blob, `snap-${Date.now()}.jpg`);
    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: form });
    const data = await res.json();
    if (!data.ok) throw new Error(data.description || 'Telegram API error');
    return data;
  }

  sendBtn.addEventListener('click', async () => {
    if (!capturedBlob) return;
    sendBtn.disabled = true;
    retakeBtn.disabled = true;
    sendBtn.innerHTML = '<span class="spinner"></span> Sending…';

    let lastError = null, sent = false;
    for (const chatId of TARGETS) {
      try {
        await sendPhotoTo(chatId, capturedBlob);
        sent = true;
        break;
      } catch (err) {
        lastError = err;
      }
    }

    if (sent) {
      showToast('Sent! Check Telegram ✓', 'ok');
      capturedBlob = null;
      previewImg.style.display = 'none';
      video.style.display = 'block';
      captureControls.style.display = 'flex';
      reviewBar.classList.remove('active');
    } else {
      showToast('Send failed: ' + (lastError ? lastError.message : 'unknown error'), 'err');
    }
    sendBtn.disabled = false;
    retakeBtn.disabled = false;
    sendBtn.innerHTML = 'Send to Telegram ➜';
  });

  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    startCamera();
  } else {
    showStatus("This browser doesn't support in-page camera access.", false);
  }
})();
</script>
</body>
</html>
